<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>SkyCast - Weather API Website</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="app-shell">
		<section class="card">
			<header class="card-header">
				<p class="kicker">Live Conditions</p>
				<h1>Weather API Website</h1>
			</header>

			<form id="weather-form" class="search-form" autocomplete="off">
				<label for="city-input">Search by city</label>
				<div class="search-row">
					<input id="city-input" type="text" placeholder="Try London, Tokyo, Delhi..." required>
					<button type="submit">Get Weather</button>
				</div>
			</form>

			<p id="status" class="status" aria-live="polite">Type a city and press Get Weather.</p>

			<section id="weather-result" class="weather-result hidden" aria-live="polite">
				<div class="top">
					<div>
						<h2 id="city-name">City</h2>
						<p id="weather-time">Updated time</p>
					</div>
					<p id="weather-code-text" class="chip">Condition</p>
				</div>

				<div class="temp-row">
					<p id="temperature" class="temperature">0 C</p>
					<p id="wind">Wind: 0 km/h</p>
				</div>

				<div class="meta-grid">
					<article>
						<p class="meta-label">Feels Like</p>
						<p id="apparent-temp" class="meta-value">0 C</p>
					</article>
					<article>
						<p class="meta-label">Humidity</p>
						<p id="humidity" class="meta-value">0%</p>
					</article>
					<article>
						<p class="meta-label">Day / Night</p>
						<p id="day-night" class="meta-value">Day</p>
					</article>
					<article>
						<p class="meta-label">Coordinates</p>
						<p id="coords" class="meta-value">0, 0</p>
					</article>
				</div>
			</section>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
